<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register Switching Demo</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">

                <div class="card shadow-lg p-4" id="loginCard">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-primary">MASUK AKUN</h3>
                        <p class="text-muted">Akses ke Dashboard Anda</p>
                    </div>

                    <form>
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="loginEmail" placeholder="user@contoh.com">
                        </div>

                        <label for="loginPasswordInput" class="form-label">Password</label>
                        <div class="input-group mb-4">
                            <input type="password" class="form-control" id="loginPasswordInput" placeholder="Masukkan password">
                            <span class="input-group-text" style="cursor: pointer;" onclick="togglePassword('login')">
                                <i class="bi bi-eye-slash" id="loginIcon"></i>
                            </span>
                        </div>

                        <button type="button" class="btn btn-primary w-100 py-2 mb-3" onclick="alert('Login berhasil (Simulasi)')">
                            Masuk
                        </button>
                    </form>

                    <p class="text-center mt-3">
                        Belum punya akun? 
                        <a href="#" onclick="showCard('register'); return false;">Daftar Sekarang</a>
                    </p>
                </div> 
                <div class="card shadow-lg p-4" id="registerCard" style="display: none;">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-success">DAFTAR AKUN BARU</h3>
                        <p class="text-muted">Gratis dan mudah!</p>
                    </div>

                    <form>
                        <div class="mb-3">
                            <label for="regUsername" class="form-label">Nama Pengguna</label>
                            <input type="text" class="form-control" id="regUsername" placeholder="e.g. jhon_doe">
                        </div>
                        <div class="mb-3">
                            <label for="regEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="regEmail" placeholder="user@contoh.com">
                        </div>

                        <label for="registerPasswordInput" class="form-label">Password</label>
                        <div class="input-group mb-4">
                            <input type="password" class="form-control" id="registerPasswordInput" placeholder="Minimal 8 karakter">
                            <span class="input-group-text" style="cursor: pointer;" onclick="togglePassword('register')">
                                <i class="bi bi-eye-slash" id="registerIcon"></i>
                            </span>
                        </div>
                        
                        <button type="button" class="btn btn-success w-100 py-2 mb-3" onclick="alert('Pendaftaran berhasil (Simulasi)')">
                            Daftar
                        </button>
                    </form>

                    <p class="text-center mt-3">
                        Sudah punya akun? 
                        <a href="#" onclick="showCard('login'); return false;">Masuk di sini</a>
                    </p>
                </div>
                </div>
        </div>
    </div>

    <script src="script.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
